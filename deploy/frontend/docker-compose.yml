services:
  backend:
    image: michael0221/eshop-backend:ec2
    container_name: mern-backend
    restart: unless-stopped
    env_file:
      - ~/deploy/.env
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "8000:5000"
    networks:
      - mern-network

  frontend:
    image: michael0221/eshop-mern-frontend:ec2
    container_name: mern-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mern-network

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DOZZLE_BASE: /logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge

name: Deploy Frontend to EC2

on:
  push:
    branches:
      - deploy/ec2

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/eshop-mern-frontend:ec2
          build-args: |
            REACT_APP_API_URL=/api
            REACT_APP_STORE_API=https://fakestoreapi.com/products

      - name: Create docker-compose.yml on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/deploy
            cat <<'COMPOSE_EOF' > ~/deploy/docker-compose.yml
            services:
              backend:
                image: michael0221/eshop-backend:ec2
                container_name: mern-backend
                restart: unless-stopped
                env_file:
                  - .env
                environment:
                  NODE_ENV: production
                  PORT: 5000
                ports:
                  - "8000:5000"
                networks:
                  - mern-network

              frontend:
                image: michael0221/eshop-mern-frontend:ec2
                container_name: mern-frontend
                restart: unless-stopped
                ports:
                  - "3000:80"
                depends_on:
                  - backend
                networks:
                  - mern-network

            networks:
              mern-network:
                driver: bridge
            COMPOSE_EOF

      - name: Create deploy script on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cat <<'SCRIPT_EOF' > ~/deploy/deploy-frontend.sh
            #!/bin/bash
            set -e
            echo "***********************************"
            echo "Deploying FRONTEND"
            echo "***********************************"
            cd ~/deploy || exit 1
            echo "Pulling frontend image..."
            docker compose pull frontend
            echo "Starting frontend..."
            docker compose up -d frontend
            echo "Pruning unused images..."
            docker image prune -f
            echo "***********************************"
            echo "Frontend deployment complete"
            echo "***********************************"
            SCRIPT_EOF
            chmod +x ~/deploy/deploy-frontend.sh

      - name: Deploy using deploy.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/deploy
            chmod +x deploy-frontend.sh
            ./deploy-frontend.sh

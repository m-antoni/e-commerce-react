# =========================
# Nginx configuration for React SPA (Single-Page Application)
# =========================
# Purpose:
# - Serve static files from the React build output
# - Enable client-side routing with React Router
# - Optimize caching for static assets
# - Designed to be used inside a Docker container (e.g., Render.com deployment)
# =========================

server {
    # Listen on port 80 (standard HTTP port)
    listen 80;

    # Server name is localhost inside container (default)
    server_name localhost;

    # Root directory for static files (React build output)
    root /usr/share/nginx/html;

    # Default index file
    index index.html;

    # =========================
    # Serve files and enable SPA routing
    # =========================
    # - If a requested file exists, serve it
    # - If it does not exist (e.g., /fakestore), serve index.html
    #   This allows React Router to handle the route client-side
    location / {
        try_files $uri /index.html;
    }

    # =========================
    # Optional: Cache static assets for better performance
    # =========================
    # - Matches common static file extensions
    # - Sets cache expiration to 1 year
    # - Adds Cache-Control header for public caching
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}